<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Outreach — Дашборд</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e6eb;
      --muted: #8b8fa3;
      --accent: #5b8def;
      --green: #3dd68c;
      --red: #f56565;
      --orange: #f6ad55;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      line-height: 1.5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; }
    .card .value { font-size: 1.75rem; font-weight: 700; }
    .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .ok { color: var(--green); }
    .warn { color: var(--orange); }
    .bad { color: var(--red); }
    .funnel { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .funnel-step {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
      min-width: 100px;
    }
    .funnel-step .num { font-size: 1.25rem; font-weight: 700; }
    .funnel-step .label { font-size: 0.7rem; color: var(--muted); }
    .arrow { color: var(--muted); font-size: 1.2rem; }
    section { margin-bottom: 32px; }
    section h2 { font-size: 1rem; margin-bottom: 12px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    th { color: var(--muted); font-weight: 500; }
    .refresh { float: right; background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .refresh:hover { opacity: 0.9; }
    #loading { color: var(--muted); }
  </style>
</head>
<body>
  <button class="refresh" onclick="loadData()">Обновить</button>
  <h1>TG Outreach Platform</h1>
  <p class="subtitle">Сквозная воронка: охват → доставка → ответ → бот → заявка → продажа</p>

  <div id="loading">Загрузка...</div>
  <div id="content" style="display:none">

    <div class="grid" id="kpis"></div>

    <section>
      <h2>Воронка</h2>
      <div class="funnel" id="funnel"></div>
    </section>

    <section>
      <h2>Экономика</h2>
      <div class="grid" id="economics"></div>
    </section>

    <section>
      <h2>Здоровье аккаунтов</h2>
      <div class="grid" id="accounts"></div>
    </section>

    <section>
      <h2>Динамика по дням</h2>
      <table>
        <thead><tr><th>Дата</th><th>Отправлено</th><th>Доставлено</th><th>Заявки</th></tr></thead>
        <tbody id="daily"></tbody>
      </table>
    </section>
  </div>

  <script>
    function pctClass(val, target, higherIsBetter = true) {
      const ok = higherIsBetter ? val >= target : val <= target;
      return ok ? 'ok' : (Math.abs(val - target) < 10 ? 'warn' : 'bad');
    }

    function kpi(title, value, sub, cls = '') {
      return `<div class="card"><h3>${title}</h3><div class="value ${cls}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
    }

    async function loadData() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      try {
        const [funnel, daily] = await Promise.all([
          fetch('/api/analytics/funnel?days=30').then(r => r.json()),
          fetch('/api/analytics/daily?days=14').then(r => r.json()),
        ]);
        render(funnel, daily);
      } catch (e) {
        document.getElementById('loading').textContent = 'Ошибка загрузки: ' + e.message;
      }
    }

    function render(data, daily) {
      const f = data.funnel;
      const e = data.economics;
      const a = data.accounts;

      document.getElementById('kpis').innerHTML = [
        kpi('Охват', f.reach, 'лидов в базе'),
        kpi('Доставка', f.delivery_pct + '%', `${f.delivered} из ${f.written}`, pctClass(f.delivery_pct, 85)),
        kpi('Ответы', f.reply_pct + '%', `${f.replied} ответили`),
        kpi('Заявки', f.applications, f.app_pct + '% от ответов'),
        kpi('CPL', e.cpl_rub + ' ₽', 'стоимость заявки'),
        kpi('CAC', e.cac_rub + ' ₽', 'стоимость клиента'),
      ].join('');

      const steps = [
        ['Охват', f.reach],
        ['Написано', f.written],
        ['Доставлено', f.delivered],
        ['Ответ', f.replied],
        ['В боте', f.in_bot],
        ['Заявка', f.applications],
        ['Созвон', f.calls],
        ['Продажа', f.sales],
      ];
      document.getElementById('funnel').innerHTML = steps.map((s, i) =>
        (i > 0 ? '<span class="arrow">→</span>' : '') +
        `<div class="funnel-step"><div class="num">${s[1]}</div><div class="label">${s[0]}</div></div>`
      ).join('');

      document.getElementById('economics').innerHTML = [
        kpi('Общие затраты', e.total_cost_rub + ' ₽', 'за 30 дней'),
        kpi('₽/сообщение', e.cost_per_message_rub, 'себестоимость'),
        kpi('Выручка', e.revenue_rub + ' ₽', 'продажи'),
      ].join('');

      document.getElementById('accounts').innerHTML = [
        kpi('Всего', a.total, 'аккаунтов'),
        kpi('Активных', a.active, 'в рассылке'),
        kpi('Смертность', a.mortality_pct + '%', `цель < ${a.mortality_target_pct}%`, pctClass(a.mortality_pct, 10, false)),
      ].join('');

      document.getElementById('daily').innerHTML = daily.map(d =>
        `<tr><td>${d.date}</td><td>${d.messages_sent}</td><td>${d.delivered}</td><td>${d.applications}</td></tr>`
      ).join('');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
