version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
      POSTGRES_DB: outreach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://outreach:outreach@postgres:5432/outreach
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
    command: python run.py serve

volumes:
  pgdata:
